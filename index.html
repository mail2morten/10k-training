<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunForge | 10k Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { 
            getAuth, 
            signInWithCustomToken, 
            signInAnonymously, 
            onAuthStateChanged, 
            signOut,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // Environment Config
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            console.error("Config missing");
            document.body.innerHTML = `<div class="flex items-center justify-center h-screen bg-slate-900 text-white p-10 text-center"><div><h1 class="text-2xl font-bold mb-2">Configuration Error</h1><p class="text-slate-400">Firebase configuration is missing or invalid.</p></div></div>`;
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'runforge-app';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let progressData = {};
        let paceChart = null;
        let weightChart = null;
        const DEFAULT_WEIGHT = 83.1;
        let currentUser = null;

        // Schedule Data
        const scheduleData = [
            { week: 1, date: "Apr 13", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "2k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "3k Easy" }, { id: "fri", name: "Friday", type: "Speed", task: "3k Intervals" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "4k Long Run" }] },
            { week: 2, date: "Apr 20", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "2k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "3k Easy" }, { id: "fri", name: "Friday", type: "Speed", task: "4k Speed" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "5k Long Run" }] },
            { week: 3, date: "Apr 27", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "3k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "4k Easy" }, { id: "fri", name: "Friday", type: "Tempo", task: "4k Tempo" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "6k Long Run" }] },
            { week: 4, date: "May 4", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "3k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "4k Easy" }, { id: "fri", name: "Friday", type: "Intervals", task: "5k Intervals" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "7k Long Run" }] },
            { week: 5, date: "May 11", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "3k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "5k Easy" }, { id: "fri", name: "Friday", type: "Tempo", task: "5k Tempo" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "8k Long Run" }] },
            { week: 6, date: "May 18", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "3k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Hard", task: "60m Soccer HIIT" }, { id: "thu", name: "Thursday", type: "Recovery", task: "5k Easy" }, { id: "fri", name: "Friday", type: "Intervals", task: "4k Intervals" }, { id: "sat", name: "Saturday", type: "Rest", task: "Rest" }, { id: "sun", name: "Sunday", type: "Long", task: "9k Long Run" }] },
            { week: 7, date: "May 25", days: [{ id: "mon", name: "Monday", type: "Recovery", task: "3k Easy" }, { id: "tue", name: "Tuesday", type: "Rest", task: "Rest" }, { id: "wed", name: "Wednesday", type: "Recovery", task: "Taper Down" }, { id: "thu", name: "Thursday", type: "Recovery", task: "2k Very Easy" }, { id: "fri", name: "Friday", type: "Rest", task: "Rest" }, { id: "sat", name: "Saturday", type: "Rest", task: "Walk" }, { id: "sun", name: "Sunday", type: "Race", task: "10k RACE DAY!" }] }
        ];

        const allWeightKeys = [];
        scheduleData.forEach(w => w.days.forEach(d => allWeightKeys.push(`w${w.week}_${d.id}_weight`)));

        // --- Auth Implementation ---
        const initAuth = async () => {
            // Show manual login button if it takes too long
            setTimeout(() => {
                const btn = document.getElementById('manual-login-btn');
                if (btn && !currentUser) btn.classList.remove('hidden');
            }, 5000);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
                const errorEl = document.getElementById('login-error');
                if (errorEl) {
                    errorEl.textContent = `Auth Error: ${err.code || err.message}`;
                    errorEl.classList.remove('hidden');
                }
            }
        };

        window.manualLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error("Popup failed", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authScreen = document.getElementById('auth-screen');
            const appContent = document.getElementById('app-content');
            
            if (user) {
                authScreen.classList.add('hidden');
                appContent.classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.uid}&background=random`;
                document.getElementById('user-name').textContent = user.displayName ? user.displayName.split(' ')[0] : 'Athlete';
                startSync(user.uid);
            } else {
                authScreen.classList.remove('hidden');
                appContent.classList.add('hidden');
            }
        });

        function startSync(uid) {
            const userDocRef = doc(db, 'artifacts', appId, 'users', uid, 'training_stats', 'main');
            
            onSnapshot(userDocRef, (snapshot) => {
                const data = snapshot.data();
                if (!data) {
                    const initial = { initialized: true };
                    allWeightKeys.forEach(k => initial[k] = DEFAULT_WEIGHT);
                    setDoc(userDocRef, initial);
                    return;
                }
                progressData = data;
                renderSchedule();
                updateCharts();
                updateStats();
            }, (error) => {
                console.error("Database Error:", error);
                document.getElementById('schedule-container').innerHTML = `<div class="p-8 bg-rose-50 dark:bg-rose-900/10 border border-rose-200 rounded-3xl text-center"><i data-lucide="alert-triangle" class="mx-auto mb-2 text-rose-500"></i><p class="text-sm font-bold text-rose-800">Database Access Denied</p><p class="text-[10px] text-rose-600/70 mt-1">${error.message}</p></div>`;
                lucide.createIcons();
            });

            window.handleInput = (el) => setDoc(userDocRef, { [el.dataset.key]: el.value }, { merge: true });

            window.handleWeightInput = (el) => {
                const key = el.dataset.key;
                const val = el.value;
                const idx = allWeightKeys.indexOf(key);
                if (idx !== -1) {
                    const updates = {};
                    for (let i = idx; i < allWeightKeys.length; i++) updates[allWeightKeys[i]] = val;
                    setDoc(userDocRef, updates, { merge: true });
                }
            };

            window.toggleTask = (key) => {
                const nextStatus = ((progressData[key] || 0) + 1) % 3;
                setDoc(userDocRef, { [key]: nextStatus }, { merge: true });
            };
        }

        // --- UI Rendering ---
        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = scheduleData.map(w => {
                const alcKey = `w${w.week}_alcohol`;
                const alc = progressData[alcKey] || 0;
                const days = w.days.map(d => {
                    const tKey = `w${w.week}_${d.id}`, pKey = `${tKey}_pace`, wKey = `${tKey}_weight`;
                    const stat = progressData[tKey] || 0;
                    const hasPace = ['mon', 'fri', 'sun'].includes(d.id);
                    return `
                        <div class="relative flex flex-col p-3 rounded-xl border transition-all ${stat === 1 ? 'bg-emerald-50/50 dark:bg-emerald-500/5 border-emerald-200' : (stat === 2 ? 'bg-rose-50/50 border-rose-200' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800')}">
                            <button onclick="toggleTask('${tKey}')" class="absolute inset-0 z-10" title="Cycle Status"></button>
                            <div class="flex justify-between items-center mb-2 z-20 pointer-events-none">
                                <span class="text-[10px] font-bold text-slate-500 uppercase">${d.name}</span>
                                <i data-lucide="${stat === 1 ? 'check-circle' : (stat === 2 ? 'x-circle' : 'circle')}" class="w-4 h-4 ${stat === 1 ? 'text-emerald-500' : (stat === 2 ? 'text-rose-500' : 'text-slate-300 dark:text-slate-600')}"></i>
                            </div>
                            <div class="z-20 pointer-events-none inline-flex px-1.5 py-0.5 rounded text-[8px] font-bold uppercase mb-1.5 w-max border ${getTypeColor(d.type)}">${d.type}</div>
                            <span class="z-20 pointer-events-none text-xs font-bold mb-3 ${stat === 1 ? 'text-slate-400 line-through' : 'dark:text-white'}">${d.task}</span>
                            <div class="relative z-30 space-y-1 mt-auto">
                                ${hasPace ? `<div class="relative"><input type="text" placeholder="Pace" data-key="${pKey}" value="${progressData[pKey]||''}" oninput="handleInput(this)" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 text-[10px] font-bold dark:text-white outline-none focus:ring-1 focus:ring-emerald-500"/><span class="absolute right-1.5 top-1/2 -translate-y-1/2 text-[8px] text-slate-400 font-bold">/km</span></div>` : ''}
                                <div class="relative"><input type="text" placeholder="Weight" data-key="${wKey}" value="${progressData[wKey]||DEFAULT_WEIGHT}" onchange="handleWeightInput(this)" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 text-[10px] font-bold dark:text-white outline-none focus:ring-1 focus:ring-cyan-500"/><span class="absolute right-1.5 top-1/2 -translate-y-1/2 text-[8px] text-slate-400 font-bold">/kg</span></div>
                            </div>
                        </div>`;
                }).join('');

                return `
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden shadow-sm mb-8">
                        <div class="bg-slate-50 dark:bg-slate-800/40 px-4 py-3 flex items-center justify-between border-b border-slate-200 dark:border-slate-800/80">
                            <div class="flex items-center space-x-3">
                                <div class="bg-emerald-500 text-white font-bold w-8 h-8 rounded-lg flex items-center justify-center text-xs">W${w.week}</div>
                                <h2 class="text-sm font-bold">Week ${w.week} - ${w.date}</h2>
                            </div>
                            <button onclick="toggleTask('${alcKey}')" class="px-3 py-1.5 rounded-lg border text-[10px] font-bold uppercase transition-all ${alc === 1 ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white dark:bg-slate-900 border-slate-200'}">Dry Discipline</button>
                        </div>
                        <div class="p-3 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2.5">${days}</div>
                    </div>`;
            }).join('');
            lucide.createIcons();
        }

        const getTypeColor = (t) => {
            const map = { 'Rest': 'text-slate-500 bg-slate-100 dark:bg-slate-800/50', 'Recovery': 'text-blue-600 bg-blue-50 dark:bg-blue-500/10 border-blue-200', 'Hard': 'text-orange-600 bg-orange-50 dark:bg-orange-500/10 border-orange-200', 'Speed': 'text-purple-600 bg-purple-50 dark:bg-purple-500/10 border-purple-200', 'Tempo': 'text-indigo-600 bg-indigo-50 dark:bg-indigo-500/10 border-indigo-200', 'Intervals': 'text-pink-600 bg-pink-50 dark:bg-pink-500/10 border-pink-200', 'Long': 'text-emerald-600 bg-emerald-50 dark:bg-emerald-500/10 border-emerald-200', 'Race': 'text-yellow-600 bg-yellow-50 dark:bg-yellow-500/20 border-yellow-300' };
            return map[t] || 'text-slate-500 bg-slate-100';
        };

        const parseNum = (v) => {
            if (!v) return null;
            const s = v.toString().replace(/[^\d:.]/g, '');
            if (s.includes(':')) { const [m, sec] = s.split(':').map(Number); return m + (sec/60); }
            return parseFloat(s) || null;
        };

        function updateCharts() {
            const paceCtx = document.getElementById('paceChart')?.getContext('2d');
            const weightCtx = document.getElementById('weightChart')?.getContext('2d');
            if (!paceCtx || !weightCtx) return;

            let pL = [], pD = [], wL = [], wD = [];
            scheduleData.forEach(w => w.days.forEach(d => {
                const wK = `w${w.week}_${d.id}_weight`;
                wL.push(`W${w.week} ${d.id[0].toUpperCase()}`);
                wD.push(parseNum(progressData[wK]) || DEFAULT_WEIGHT);
                if (['mon', 'fri', 'sun'].includes(d.id)) {
                    pL.push(`W${w.week} ${d.id[0].toUpperCase()}`);
                    pD.push(parseNum(progressData[`w${w.week}_${d.id}_pace`]));
                }
            }));

            if (paceChart) { paceChart.data.labels = pL; paceChart.data.datasets[0].data = pD; paceChart.update(); }
            else { paceChart = new Chart(paceCtx, { type: 'line', data: { labels: pL, datasets: [{ data: pD, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.3, fill: true, spanGaps: true, pointRadius: 1 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { reverse: true, ticks: { font: { size: 9 }, callback: v => { const m = Math.floor(v), s = Math.round((v-m)*60); return `${m}:${s.toString().padStart(2,'0')}`; } } }, x: { display: false } } } }); }

            if (weightChart) { weightChart.data.labels = wL; weightChart.data.datasets[0].data = wD; weightChart.update(); }
            else { weightChart = new Chart(weightCtx, { type: 'line', data: { labels: wL, datasets: [{ data: wD, borderColor: '#06b6d4', backgroundColor: 'rgba(6, 182, 212, 0.1)', tension: 0.3, fill: true, spanGaps: true, pointRadius: 1 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 9 } } }, x: { display: false } } } }); }
        }

        function updateStats() {
            const total = (scheduleData.length * 7) + scheduleData.length;
            const done = Object.keys(progressData).filter(k => !k.includes('_pace') && !k.includes('_weight') && progressData[k] === 1).length;
            const perc = Math.round((done / total) * 100);
            document.getElementById('progress-tasks').textContent = done;
            document.getElementById('progress-percentage').textContent = perc;
            document.getElementById('progress-bar-fill').style.width = `${perc}%`;
        }

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        window.onload = initAuth;
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#0B0F19] text-slate-900 dark:text-slate-200 font-sans transition-colors duration-300">

    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-50 dark:bg-[#0B0F19] px-4">
        <div class="text-center space-y-6 max-w-sm w-full bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800">
            <div class="w-20 h-20 bg-emerald-50 dark:bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-2 border border-emerald-100 dark:border-emerald-500/20">
                <i data-lucide="trophy" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight mb-2">Run<span class="text-emerald-500">Forge</span></h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Forging your 10k mastery.</p>
            </div>
            <div id="login-error" class="hidden p-3 bg-rose-50 dark:bg-rose-900/20 border border-rose-200 rounded-xl text-xs text-rose-600"></div>
            <div class="flex flex-col items-center justify-center space-y-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"></div>
                <button id="manual-login-btn" onclick="manualLogin()" class="hidden px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-sm font-bold transition-all">Sign in Manually</button>
            </div>
            <p class="text-[10px] text-slate-400">Authenticating session...</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="border-b border-slate-200 dark:border-slate-800/60 bg-white/80 dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i data-lucide="trophy" class="w-6 h-6 text-emerald-500"></i>
                    <span class="text-xl font-bold tracking-tight">RunForge</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 transition-colors">
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                        <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
                    </button>
                    <div class="flex items-center space-x-3 bg-slate-100 dark:bg-slate-800 py-1 pl-1 pr-3 rounded-full">
                        <img id="user-avatar" src="" class="w-7 h-7 rounded-full border border-white dark:border-slate-700">
                        <span id="user-name" class="text-xs font-bold">Athlete</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <div class="inline-flex items-center space-x-2 bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-200 dark:border-emerald-500/20 text-emerald-600 dark:text-emerald-400 px-4 py-1.5 rounded-full text-sm font-semibold mb-6">
                    <i data-lucide="calendar" class="w-4 h-4"></i>
                    <span>Race Day: May 31st</span>
                </div>
                <h1 class="text-4xl sm:text-6xl font-extrabold tracking-tight mb-8">
                    7-Week <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-cyan-400">10k Mastery</span>
                </h1>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-slate-100 dark:bg-slate-800">
                            <div id="progress-bar-fill" class="h-full bg-emerald-500 transition-all duration-1000 w-0"></div>
                        </div>
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-1">Completion</p>
                        <p class="text-3xl font-bold tracking-tight"><span id="progress-percentage">0</span>%</p>
                        <div class="mt-4 flex justify-between items-center text-[10px] font-bold text-emerald-500">
                            <span>CLOUD SYNCED</span>
                            <span><span id="progress-tasks">0</span> / 63 UNITS</span>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 shadow-xl h-28">
                        <div class="flex items-center space-x-2 mb-2"><i data-lucide="zap" class="w-3 h-3 text-emerald-500"></i><h3 class="text-[9px] font-bold uppercase text-slate-400">Pace Trend</h3></div>
                        <div class="h-16"><canvas id="paceChart"></canvas></div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 shadow-xl h-28">
                        <div class="flex items-center space-x-2 mb-2"><i data-lucide="scale" class="w-3 h-3 text-cyan-500"></i><h3 class="text-[9px] font-bold uppercase text-slate-400">Weight Profile</h3></div>
                        <div class="h-16"><canvas id="weightChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div id="schedule-container" class="space-y-6"></div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
